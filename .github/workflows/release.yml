name: Publish to npm

# Publishes on a version tag (e.g. v1.0.1) via npm Trusted Publishing (OIDC) —
# no NPM_TOKEN required, provenance generated automatically.
# Prereq (one-time): the package must already exist on npm AND a trusted publisher
# must be configured at npmjs.com → package → Settings → Trusted Publisher:
#   repository: amanblog/glasskit   workflow: release.yml
#
# Cutting a release:
#   npm version patch        # bumps package.json + creates the tag & commit
#   git push --follow-tags
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # REQUIRED for OIDC / trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # trusted publishing needs npm >= 11.5.1 (newer than what Node bundles)
      - name: Upgrade npm
        run: npm install -g npm@latest
      - name: Verify tag matches package version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v$TAG != package.json $PKG"; exit 1
          fi
      # idempotent: if this version is already on npm, skip instead of failing
      - name: Skip if already published
        id: check
        run: |
          if npm view "glasskit-js@${GITHUB_REF_NAME#v}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::glasskit-js@${GITHUB_REF_NAME#v} already on npm — skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        if: steps.check.outputs.published == 'false'
        run: npm publish --provenance --access public
