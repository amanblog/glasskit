name: Publish to npm

# Publishes on a version tag (e.g. v2.0.1). Tag-driven rather than push-driven
# because npm rejects re-publishing an existing version — every main push would fail.
#   npm version patch    # bumps package.json + creates the tag + commit
#   git push --follow-tags
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      # fail early if the tag and package.json version disagree
      - name: Verify tag matches package version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v$TAG != package.json $PKG"; exit 1
          fi
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
